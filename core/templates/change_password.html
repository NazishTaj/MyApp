{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto">

<h2 class="text-2xl font-semibold mb-2">
Change Password
</h2>

<p class="text-gray-500 text-sm mb-6">
Update your account password securely
</p>


<div class="card">

<form method="POST" class="space-y-5">

{% csrf_token %}

<!-- Old Password -->

<div>
<label class="block text-sm font-medium text-gray-600 mb-1">
Current Password
</label>

<input type="password"
name="old_password"
class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>


<!-- New Password -->

<div>
<label class="block text-sm font-medium text-gray-600 mb-1">
New Password
</label>

<input type="password"
name="new_password1"
class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>


<!-- Confirm Password -->

<div>
<label class="block text-sm font-medium text-gray-600 mb-1">
Confirm New Password
</label>

<input type="password"
name="new_password2"
class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>


<!-- Errors -->

{% if form.errors %}
<div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg p-3">
{{ form.errors }}
</div>
{% endif %}


<!-- Buttons -->

<div class="flex gap-3 pt-2">

<button type="submit"
class="btn btn-primary">
Update Password
</button>

<a href="/profile/"
class="px-4 py-2 text-sm bg-gray-100 hover:bg-gray-200 rounded-lg">
Cancel
</a>

</div>

</form>

</div>

</div>

{% endblock %}
