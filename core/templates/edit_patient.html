{% extends "base.html" %}
{% block page_title %}Edit Patient{% endblock %}

{% block content %}

<style>
  .input-icon-wrapper {
    position: relative;
  }
  .input-icon-wrapper .icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    color: #9ca3af;
    pointer-events: none;
  }
  .input-icon-wrapper input,
  .input-icon-wrapper select {
    padding-left: 44px !important;
  }
  .input-icon-wrapper .select-arrow {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: #9ca3af;
    pointer-events: none;
  }
</style>

<div class="max-w-3xl mx-auto">

  <!-- Page Header -->
  <div class="flex items-center gap-4 mb-8">
    <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
      <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
      </svg>
    </div>
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Edit Patient</h1>
      <p class="text-gray-500 text-sm">Update patient information</p>
    </div>
    <a href="{% url 'patient_list' %}" class="btn-premium btn-ghost ml-auto">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      Back to List
    </a>
  </div>

  <!-- Patient Card -->
  <div class="card-premium p-6 md:p-8">
    <!-- Card Header -->
    <div class="flex items-center gap-3 mb-6 pb-6 border-b border-gray-100">
      <div class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center">
        <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <div>
        <h2 class="font-semibold text-gray-900">Patient Information</h2>
        <p class="text-sm text-gray-500">Update the details below</p>
      </div>
    </div>

    <form method="POST" class="space-y-6">
      {% csrf_token %}

      <!-- Name + Phone -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Patient Name</label>
          <div class="input-icon-wrapper">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <input type="text" name="name" value="{{ patient.name }}" required
              placeholder="Enter patient name"
              class="input-premium w-full">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Phone Number</label>
          <div class="input-icon-wrapper">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
            </svg>
            <input type="text" name="phone" value="{{ patient.phone }}" required
              placeholder="10 digit number"
              class="input-premium w-full">
          </div>
        </div>
      </div>

      <!-- Age + Gender -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Age</label>
          <div class="input-icon-wrapper">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <input type="number" name="age" value="{{ patient.age }}"
              placeholder="Patient age"
              class="input-premium w-full">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Gender</label>
          <div class="input-icon-wrapper">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m9 5.197v1"/>
            </svg>
            <select name="gender" class="input-premium w-full appearance-none cursor-pointer">
              <option value="Male" {% if patient.gender == "Male" %}selected{% endif %}>Male</option>
              <option value="Female" {% if patient.gender == "Female" %}selected{% endif %}>Female</option>
              <option value="Other" {% if patient.gender == "Other" %}selected{% endif %}>Other</option>
            </select>
            <svg class="select-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Address -->
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Address</label>
        <div class="input-icon-wrapper">
          <svg class="icon" style="top: 14px; transform: none;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <input type="text" name="address" value="{{ patient.address }}"
            placeholder="Enter patient address"
            class="input-premium w-full">
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex items-center justify-between pt-6 border-t border-gray-100">
        <a href="{% url 'patient_list' %}" class="btn-premium btn-ghost">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
          Cancel
        </a>
        <button type="submit" class="btn-premium btn-primary">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          Update Patient
        </button>
      </div>

    </form>
  </div>

</div>

{% endblock %}
