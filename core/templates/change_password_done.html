{% extends "base.html" %}

{% block content %}

<div class="min-h-[60vh] flex items-center justify-center px-4">
    <div class="max-w-md w-full">
        
        <!-- Success Card -->
        <div class="card-premium text-center p-6 sm:p-8">
            
            <!-- Success Icon -->
            <div class="mx-auto w-20 h-20 bg-gradient-to-br from-emerald-100 to-green-100 rounded-full flex items-center justify-center mb-6 shadow-lg shadow-emerald-100">
                <div class="w-14 h-14 bg-gradient-to-br from-emerald-500 to-green-500 rounded-full flex items-center justify-center">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
            </div>
            
            <!-- Title -->
            <h2 class="text-2xl font-bold text-gray-900 mb-2">
                Password Updated
            </h2>
            
            <!-- Subtitle -->
            <p class="text-gray-500 mb-8">
                Your password has been successfully changed. You can now use your new password to log in.
            </p>
            
            <!-- Security Info -->
            <div class="bg-amber-50 border border-amber-100 rounded-xl p-4 mb-6">
                <div class="flex items-start gap-3">
                    <div class="w-8 h-8 bg-amber-100 rounded-lg flex items-center justify-center flex-shrink-0">
                        <svg class="w-4 h-4 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                    </div>
                    <p class="text-sm text-amber-800 text-left">
                        For security reasons, you may need to log in again on other devices using your new password.
                    </p>
                </div>
            </div>
            
            <!-- Action Button -->
            <a href="/dashboard/" class="btn-premium btn-primary w-full justify-center">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                Go to Dashboard
            </a>
            
        </div>
        
    </div>
</div>

{% endblock %}
