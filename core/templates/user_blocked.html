<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Access Restricted - QuroDesk</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    font-family: 'Inter', sans-serif;
}

/* Floating blobs */
@keyframes float {
    0%,100% { transform: translateY(0px);}
    50% { transform: translateY(-20px);}
}

/* subtle fade */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.animate-float { animation: float 6s ease-in-out infinite; }
.animate-fadeUp { animation: fadeUp 0.8s ease forwards; }

.blob {
    border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
    filter: blur(60px);
    opacity: 0.4;
}
</style>

</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 relative overflow-hidden">

<!-- 🌈 BACKGROUND (Landing page style) -->
<div class="absolute inset-0 bg-gradient-to-br from-cyan-50 via-white to-cyan-100"></div>

<div class="absolute top-20 left-10 w-72 h-72 bg-cyan-300 blob animate-float"></div>
<div class="absolute bottom-20 right-10 w-96 h-96 bg-blue-200 blob animate-float" style="animation-delay:2s;"></div>

<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[700px] h-[700px] bg-cyan-100 rounded-full blur-3xl opacity-40"></div>

<!-- CARD -->
<div class="relative w-full max-w-md animate-fadeUp">

    <div class="bg-white/90 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/60 p-8 text-center">

        <!-- ICON -->
        <div class="relative mb-6">
            <div class="w-20 h-20 mx-auto rounded-2xl bg-gradient-to-br from-cyan-500 to-cyan-600 flex items-center justify-center shadow-lg">

                <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>

            </div>

            <!-- glow ring -->
            <div class="absolute inset-0 w-20 h-20 mx-auto rounded-2xl border-4 border-cyan-200 animate-ping opacity-20"></div>
        </div>

        <!-- TITLE -->
        <h1 class="text-2xl font-bold text-gray-900">
            Access Restricted
        </h1>

        <!-- BADGE -->
        <div class="mt-3">
            <span class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-semibold bg-cyan-100 text-cyan-700 border border-cyan-200">
                <span class="w-2 h-2 bg-cyan-500 rounded-full animate-pulse"></span>
                Account Suspended
            </span>
        </div>

        <!-- TEXT -->
        <p class="text-sm text-gray-600 mt-4 leading-relaxed">
            Your account has been <span class="font-semibold text-gray-800">temporarily blocked</span>.
            Please contact support to regain access.
        </p>

        <!-- INFO BOX -->
        <div class="mt-6 text-left bg-gray-50 rounded-2xl p-5 border border-gray-100">

            <p class="font-semibold text-gray-800 text-sm mb-3 flex items-center gap-2">
                ℹ️ What does this mean?
            </p>

            <ul class="space-y-2 text-sm text-gray-600">
                <li class="flex gap-2">❌ Mistake? Contact support</li>
                <li class="flex gap-2">⏳ Response time: 24 hours</li>
                <li class="flex gap-2">✅ info@qurodesk.in</li>
            </ul>

        </div>

        <!-- BUTTON -->
        <div class="mt-6">
            <a href="/logout/"
               class="w-full inline-flex justify-center items-center px-6 py-3 rounded-xl font-semibold text-white bg-gradient-to-r from-cyan-600 to-cyan-700 shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all duration-300">

                Logout & Exit
            </a>
        </div>

        <!-- FOOTER -->
        <p class="text-xs text-gray-400 mt-5">
            QuroDesk Support • Secure Access System
        </p>

    </div>

</div>

</body>
</html>
