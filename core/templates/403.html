{% extends "base.html" %}

{% block page_title %}Access Denied{% endblock %}

{% block content %}

<div class="min-h-[70vh] flex flex-col items-center justify-center text-center px-4">

    <!-- Icon Container with Gradient -->
    <div class="relative mb-6">
        <div class="absolute inset-0 bg-gradient-to-br from-red-400 to-red-600 rounded-3xl blur-2xl opacity-20"></div>
        <div class="relative w-20 h-20 rounded-2xl bg-gradient-to-br from-red-50 to-red-100 border border-red-100 flex items-center justify-center shadow-lg shadow-red-500/10">
            <svg class="w-10 h-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />
            </svg>
        </div>
    </div>

    <!-- Title -->
    <h1 class="text-2xl md:text-3xl font-bold text-surface-800 tracking-tight mb-3">
        Access Denied
    </h1>

    <!-- Message -->
    <p class="text-surface-500 mb-8 max-w-sm leading-relaxed">
        You don&apos;t have permission to access this feature. Please contact the clinic owner if you believe this is a mistake.
    </p>

    <!-- Action Buttons -->
    <div class="flex flex-col sm:flex-row items-center gap-3">
        <a href="/dashboard/" class="btn-premium btn-primary">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            Go to Dashboard
        </a>
        <a href="javascript:history.back()" class="btn-premium btn-ghost">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Go Back
        </a>
    </div>

    <!-- Help Text -->
    <p class="mt-10 text-xs text-surface-400">
        Need help? 
        <a href="/contact/" class="text-brand-500 hover:text-brand-600 font-medium hover:underline transition-colors">Contact Support</a>
    </p>

</div>

{% endblock %}
