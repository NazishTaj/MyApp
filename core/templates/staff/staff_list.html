{% extends "base.html" %}

{% block content %}

<div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-semibold">Staff</h2>

    <a href="/staff/add/" 
    class="bg-blue-600 text-white px-4 py-2 rounded">
        + Add Staff
    </a>
</div>

<div class="bg-white rounded-xl shadow p-4">

<table class="w-full text-sm">
    <thead>
        <tr class="text-left text-gray-500 border-b">
            <th class="py-2">Name</th>
            <th>Username</th>
            <th>Role</th>
            <th class="text-right">Actions</th> <!-- 🔥 NEW -->
        </tr>
    </thead>

    <tbody>
        {% for s in staff %}
        <tr class="border-b hover:bg-gray-50 transition">

            <td class="py-2 font-medium text-gray-800">
                {{ s.name }}
            </td>

            <td class="text-gray-600">
                {{ s.user.username }}
            </td>

            <td>
                <span class="px-2 py-1 text-xs bg-gray-100 rounded">
                    {{ s.role }}
                </span>
            </td>

            <!-- 🔥 ACTION BUTTON -->
            <td class="text-right">
                <a href="/staff/{{ s.id }}/permissions/" 
                class="px-3 py-1 text-xs bg-blue-100 text-blue-700 rounded hover:bg-blue-200 transition">
                    Permissions
                </a>
            </td>

        </tr>

        {% empty %}
        <tr>
            <td colspan="4" class="text-center py-6 text-gray-400">
                No staff added yet
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</div>

{% endblock %}
