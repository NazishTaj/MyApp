{% extends "base.html" %}

{% block content %}

<div class="min-h-[80vh] flex items-center justify-center px-4">

<div class="w-full max-w-lg">

    <!-- Header -->
    <div class="text-center mb-6">
        <h2 class="text-3xl font-semibold text-gray-800">
            Add New Staff
        </h2>
        <p class="text-sm text-gray-500 mt-1">
            Create a new staff member and assign role
        </p>
    </div>

    <!-- Card -->
    <form method="POST" class="bg-white/90 backdrop-blur p-6 md:p-8 rounded-2xl shadow-lg border border-gray-100 space-y-5">
        {% csrf_token %}

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-2 rounded-lg">
            {{ error }}
        </div>
        {% endif %}

        <!-- Name -->
        <div>
            <label class="text-sm font-medium text-gray-700 mb-1 block">Full Name</label>
            <input 
                type="text" 
                name="name" 
                placeholder="Enter full name"
                required
                class="w-full border border-gray-200 px-4 py-2.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
        </div>

        <!-- Username -->
        <div>
            <label class="text-sm font-medium text-gray-700 mb-1 block">Username</label>
            <input 
                type="text" 
                name="username" 
                placeholder="Choose username"
                required
                class="w-full border border-gray-200 px-4 py-2.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
        </div>

        <!-- Email -->
        <div>
            <label class="text-sm font-medium text-gray-700 mb-1 block">Email</label>
            <input 
                type="email" 
                name="email" 
                placeholder="Enter email address"
                class="w-full border border-gray-200 px-4 py-2.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
        </div>

        <!-- Password -->
        <div>
            <label class="text-sm font-medium text-gray-700 mb-1 block">Password</label>
            <input 
                type="password" 
                name="password" 
                placeholder="Minimum 6 characters"
                required
                minlength="6"
                class="w-full border border-gray-200 px-4 py-2.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
        </div>

        <!-- Role -->
        <div>
            <label class="text-sm font-medium text-gray-700 mb-1 block">Role</label>
            <select 
                name="role" 
                id="roleSelect"
                required
                class="w-full border border-gray-200 px-4 py-2.5 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">

                <option value="">Select Role</option>
                <option value="doctor">Doctor 👨‍⚕️</option>
                <option value="receptionist">Receptionist 🧑‍💼</option>
                <option value="assistant">Assistant</option>

            </select>
        </div>

        <!-- Assigned Doctor -->
        <div id="doctorSelectBox" class="hidden">
            <label class="text-sm font-medium text-gray-700 mb-1 block">
                Assign Doctor
            </label>
            <select name="assigned_doctor"
                class="w-full border border-gray-200 px-4 py-2.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                <option value="">Select Doctor</option>
                {% for doc in doctors %}
                    <option value="{{ doc.id }}">{{ doc.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Buttons -->
        <div class="flex flex-col gap-3 pt-4">

            <!-- Primary Button -->
            <button 
                type="submit"
                class="w-full py-3 text-sm font-medium text-white rounded-lg 
                bg-gradient-to-r from-blue-600 to-blue-500 
                hover:from-blue-700 hover:to-blue-600 
                shadow-md hover:shadow-lg 
                transition duration-200">
                🚀 Create Staff
            </button>

            <!-- Secondary -->
            <a href="/staff/" 
            class="w-full text-center py-2.5 text-sm text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition">
                Cancel
            </a>

        </div>

    </form>

</div>
</div>

<!-- JS SAME -->
<script>
const roleSelect = document.getElementById("roleSelect");
const doctorBox = document.getElementById("doctorSelectBox");

roleSelect.addEventListener("change", function() {
    if (this.value === "assistant") {
        doctorBox.classList.remove("hidden");
    } else {
        doctorBox.classList.add("hidden");
    }
});
</script>

{% endblock %}
