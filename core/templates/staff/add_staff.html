{% extends "base.html" %}

{% block content %}

<div class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 flex items-center justify-center px-4">

<div class="w-full max-w-md">

    <!-- Header -->
    <div class="text-center mb-8">
        <h2 class="text-3xl font-semibold text-gray-900">
            Add New Staff
        </h2>
        <p class="text-sm text-gray-500 mt-2">
            Create account & assign role
        </p>
    </div>

    <!-- Card -->
    <form method="POST" autocomplete="off"
    class="bg-white rounded-2xl shadow-xl border border-gray-100 p-6 space-y-5">
        {% csrf_token %}

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-2 rounded-lg">
            {{ error }}
        </div>
        {% endif %}

        <!-- Name -->
        <div>
            <label class="text-xs text-gray-500">Full Name</label>
            <input 
                type="text" 
                name="name" 
                placeholder="Enter full name"
                required
                autocomplete="off"
                class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition">
        </div>

        <!-- Username -->
        <div>
            <label class="text-xs text-gray-500">Username</label>
            <input 
                type="text" 
                name="username" 
                placeholder="Choose username"
                required
                autocomplete="off"
                class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition">
        </div>

        <!-- Email -->
        <div>
            <label class="text-xs text-gray-500">Email</label>
            <input 
                type="email" 
                name="email" 
                placeholder="Enter email"
                autocomplete="off"
                class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition">
        </div>

        <!-- Password -->
        <div>
            <label class="text-xs text-gray-500">Password</label>
            <input 
                type="password" 
                name="password" 
                placeholder="Minimum 6 characters"
                required
                minlength="6"
                autocomplete="new-password"
                class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition">
        </div>

        <!-- Role -->
        <div>
            <label class="text-xs text-gray-500">Role</label>
            <select 
                name="role" 
                id="roleSelect"
                required
                class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition">

                <option value="">Select Role</option>
                <option value="doctor">Doctor 👨‍⚕️</option>
                <option value="receptionist">Receptionist 🧑‍💼</option>
                <option value="assistant">Assistant</option>

            </select>
        </div>

        <!-- Assigned Doctor -->
        <div id="doctorSelectBox" class="hidden">
            <label class="text-xs text-gray-500">Assign Doctor</label>
            <select name="assigned_doctor"
                class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition">
                <option value="">Select Doctor</option>
                {% for doc in doctors %}
                    <option value="{{ doc.id }}">{{ doc.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Buttons -->
        <div class="pt-4 space-y-3">

            <button 
                type="submit"
                class="w-full py-3 rounded-xl text-white font-medium 
                bg-gradient-to-r from-blue-600 to-indigo-600 
                hover:from-blue-700 hover:to-indigo-700 
                shadow-md hover:shadow-xl 
                transform hover:-translate-y-0.5 
                transition duration-200">
                🚀 Create Staff
            </button>

            <a href="/staff/" 
            class="block text-center py-2.5 text-sm text-gray-500 hover:text-gray-700 transition">
                Cancel
            </a>

        </div>

    </form>

</div>
</div>

<!-- JS SAME -->
<script>
const roleSelect = document.getElementById("roleSelect");
const doctorBox = document.getElementById("doctorSelectBox");

roleSelect.addEventListener("change", function() {
    if (this.value === "assistant") {
        doctorBox.classList.remove("hidden");
    } else {
        doctorBox.classList.add("hidden");
    }
});
</script>

{% endblock %}
