{% extends "base.html" %}

{% block content %}

<!-- Page Wrapper -->
<div class="px-4 md:px-8 py-6">

    <!-- Header (Aligned left for dashboard feel) -->
    <div class="mb-6">
        <h2 class="text-2xl font-semibold text-gray-800">
            Add New Staff
        </h2>
        <p class="text-sm text-gray-500 mt-1">
            Create account & assign role
        </p>
    </div>

    <!-- Content Area -->
    <div class="max-w-2xl">

        <!-- Card -->
        <form method="POST" autocomplete="off"
        class="bg-white rounded-2xl shadow-md border border-gray-100 p-5 md:p-7 space-y-5">
            {% csrf_token %}

            {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-2 rounded-lg">
                {{ error }}
            </div>
            {% endif %}

            <!-- Grid Layout -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <!-- Name -->
                <div class="md:col-span-2">
                    <label class="text-xs text-gray-500">Full Name</label>
                    <input type="text" name="name" required autocomplete="off"
                    placeholder="Enter full name"
                    class="w-full mt-1 px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 transition">
                </div>

                <!-- Username -->
                <div>
                    <label class="text-xs text-gray-500">Username</label>
                    <input type="text" name="username" required autocomplete="off"
                    placeholder="Choose username"
                    class="w-full mt-1 px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 transition">
                </div>

                <!-- Email -->
                <div>
                    <label class="text-xs text-gray-500">Email</label>
                    <input type="email" name="email" autocomplete="off"
                    placeholder="Enter email"
                    class="w-full mt-1 px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 transition">
                </div>

                <!-- Password -->
                <div>
                    <label class="text-xs text-gray-500">Password</label>
                    <input type="password" name="password" required minlength="6"
                    autocomplete="new-password"
                    placeholder="Minimum 6 characters"
                    class="w-full mt-1 px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 transition">
                </div>

                <!-- Role -->
                <div>
                    <label class="text-xs text-gray-500">Role</label>
                    <select name="role" id="roleSelect" required
                    class="w-full mt-1 px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 transition">
                        <option value="">Select Role</option>
                        <option value="doctor">Doctor 👨‍⚕️</option>
                        <option value="receptionist">Receptionist 🧑‍💼</option>
                        <option value="assistant">Assistant</option>
                    </select>
                </div>

            </div>

            <!-- Assigned Doctor -->
            <div id="doctorSelectBox" class="hidden">
                <label class="text-xs text-gray-500">Assign Doctor</label>
                <select name="assigned_doctor"
                class="w-full mt-1 px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 transition">
                    <option value="">Select Doctor</option>
                    {% for doc in doctors %}
                        <option value="{{ doc.id }}">{{ doc.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Buttons -->
            <div class="flex flex-col md:flex-row justify-end gap-3 pt-4">

                <a href="/staff/" 
                class="px-4 py-2.5 text-sm text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition">
                    Cancel
                </a>

                <button type="submit"
                class="px-6 py-2.5 text-sm font-medium text-white rounded-lg 
                bg-gradient-to-r from-blue-600 to-indigo-600 
                hover:from-blue-700 hover:to-indigo-700 
                shadow-sm hover:shadow-md transition">
                    🚀 Create Staff
                </button>

            </div>

        </form>

    </div>

</div>

<!-- JS SAME -->
<script>
const roleSelect = document.getElementById("roleSelect");
const doctorBox = document.getElementById("doctorSelectBox");

roleSelect.addEventListener("change", function() {
    if (this.value === "assistant") {
        doctorBox.classList.remove("hidden");
    } else {
        doctorBox.classList.add("hidden");
    }
});
</script>

{% endblock %}
