{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto">

```
<h2 class="text-xl font-semibold mb-4">Add Staff</h2>

{% if error %}
<p class="text-red-500 text-sm mb-3">{{ error }}</p>
{% endif %}

<form method="POST" class="space-y-4 bg-white p-6 rounded-xl shadow">
    {% csrf_token %}

    <!-- Name -->
    <input 
        type="text" 
        name="name" 
        placeholder="Full Name"
        required
        class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

    <!-- Username -->
    <input 
        type="text" 
        name="username" 
        placeholder="Username"
        required
        class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
    <input type="email" name="email" placeholder="Email"
        class="w-full border p-2 rounded">

    <!-- Password -->
    <input 
        type="password" 
        name="password" 
        placeholder="Password (min 6 characters)"
        required
        minlength="6"
        class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

    <!-- Role -->
    <select 
    name="role" 
    required
    class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">

    <option value="">Select Role</option>

    <option value="doctor">Doctor 👨‍⚕️</option>   <!-- 🔥 ADD THIS -->

    <option value="receptionist">Receptionist 🧑‍💼</option>
    <option value="assistant">Assistant</option>

</select>

    <!-- Submit Button -->
    <button 
        type="submit"
        class="bg-blue-600 text-white px-4 py-2 rounded w-full hover:bg-blue-700 transition">
        Create Staff
    </button>

</form>
```

</div>

{% endblock %}
