{% extends "base.html" %}

{% block content %}

<div class="max-w-2xl mx-auto px-4">

    <!-- Header -->
    <div class="mb-6">
        <h2 class="text-2xl font-semibold text-gray-800">
            Manage Permissions
        </h2>
        <p class="text-sm text-gray-500 mt-1">
            Staff: 
            <span class="font-medium text-gray-700">{{ staff.name }}</span>
        </p>
    </div>

    <!-- Card -->
    <form method="POST" class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-gray-100 space-y-5">
        {% csrf_token %}

        <!-- Permissions List -->
        <div class="space-y-3">

            {% for perm in permissions %}
            <label class="flex items-center justify-between border border-gray-200 rounded-xl px-4 py-3 hover:bg-gray-50 transition cursor-pointer">

                <!-- Left -->
                <div>
                    <p class="text-sm font-medium text-gray-800">
                        {{ perm.label }}
                    </p>
                </div>

                <!-- Checkbox -->
                <input 
                    type="checkbox" 
                    name="permissions" 
                    value="{{ perm.code }}"
                    class="w-5 h-5 accent-blue-600 cursor-pointer"
                    {% if perm.code in user_perm_codes %}checked{% endif %}
                >

            </label>
            {% endfor %}

        </div>

        <!-- Divider -->
        <div class="border-t pt-4"></div>

        <!-- Buttons -->
        <div class="flex flex-col-reverse md:flex-row md:justify-end gap-3">

            <a href="/staff/" 
            class="w-full md:w-auto text-center px-4 py-2.5 text-sm bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">
                Cancel
            </a>

            <button 
            class="w-full md:w-auto px-4 py-2.5 text-sm font-medium bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition shadow-sm">
                Save Permissions
            </button>

        </div>

    </form>

</div>

{% endblock %}
