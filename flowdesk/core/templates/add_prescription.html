{% extends "base.html" %}

{% block content %}

<div class="max-w-3xl mx-auto">

<!-- Header -->

<div class="mb-6">

<h2 class="text-2xl font-semibold">Add Prescription</h2>

<p class="text-gray-500 text-sm">
Patient: <span class="font-medium text-gray-700">{{ patient.name }}</span>
</p>

</div>


<!-- Form Card -->

<div class="bg-white rounded-xl shadow p-6">

<form method="POST">

{% csrf_token %}


<div class="grid grid-cols-3 gap-4 mb-4">

<div>
<label class="text-sm font-medium">Weight</label>
<input type="text" name="weight"
class="w-full border rounded-lg px-3 py-2 text-sm">
</div>

<div>
<label class="text-sm font-medium">Blood Group</label>
<input type="text" name="blood_group"
class="w-full border rounded-lg px-3 py-2 text-sm">
</div>


</div>
<!-- Diagnosis -->

<div class="mb-5">

<label class="block text-sm font-medium text-gray-700 mb-1">
Diagnosis
</label>

<textarea
name="diagnosis"
rows="2"
placeholder="Enter diagnosis"
class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-200">
</textarea>

</div>


<!-- Symptoms -->

<div class="mb-5">

<label class="block text-sm font-medium text-gray-700 mb-1">
Symptoms
</label>

<textarea
name="symptoms"
rows="2"
placeholder="Enter symptoms"
class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-200">
</textarea>

</div>


<!-- Medicines -->

<div class="mb-5">

<label class="block text-sm font-medium text-gray-700 mb-1">
Medicines
</label>

<textarea
name="medicines"
rows="4"
placeholder="Example: 
Dolo 650 - 1-0-1 AF  
Pantoprazole 40 - 1-0-0 BBF  
Cetirizine - 0-0-1 HS"
class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-200">
</textarea>

</div>


<!-- Tests -->

<div class="mb-5">

<label class="block text-sm font-medium text-gray-700 mb-1">
Tests
</label>

<textarea
name="tests"
rows="2"
placeholder="Blood test, X-ray, etc"
class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-200">
</textarea>

</div>


<!-- Notes -->

<div class="mb-6">

<label class="block text-sm font-medium text-gray-700 mb-1">
Notes
</label>

<textarea
name="notes"
rows="2"
placeholder="Any additional advice"
class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-200">
</textarea>

</div>


<!-- Buttons -->

<div class="flex gap-3">

<button 
type="submit"
class="px-4 py-2 text-sm bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition shadow-sm">

Save Prescription

</button>

<a href="/patient-history/{{ patient.id }}/"
class="px-4 py-2 text-sm bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">

Cancel

</a>

</div>


</form>

</div>

</div>

{% endblock %}
