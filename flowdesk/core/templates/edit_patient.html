{% extends "base.html" %}
{% block page_title %}Edit Patient{% endblock %}

{% block content %}

<div class="min-h-screen bg-gray-100 py-8 px-4">

<div class="max-w-4xl mx-auto">

<!-- Page Header -->

<div class="flex items-center justify-between mb-6">

<h2 class="text-3xl font-bold text-blue-600">
Edit Patient Details
</h2>

<a href="{% url 'patient_list' %}"
class="text-sm bg-gray-200 px-4 py-2 rounded-lg hover:bg-gray-300">
← Back
</a>

</div>



<!-- Patient Card -->

<div class="bg-white shadow-lg rounded-2xl p-8">

<form method="POST" class="space-y-6">
{% csrf_token %}



<!-- GRID START -->

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<!-- Name -->

<div>
<label class="block text-sm font-medium text-gray-600 mb-1">
Patient Name
</label>

<input
type="text"
name="name"
value="{{ patient.name }}"
required
class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
>
</div>



<!-- Phone -->

<div>
<label class="block text-sm font-medium text-gray-600 mb-1">
Phone Number
</label>

<input
type="text"
name="phone"
value="{{ patient.phone }}"
required
class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
>
</div>



<!-- Age -->

<div>
<label class="block text-sm font-medium text-gray-600 mb-1">
Age
</label>

<input
type="number"
name="age"
value="{{ patient.age }}"
class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
>
</div>



<!-- Gender -->

<div>
<label class="block text-sm font-medium text-gray-600 mb-1">
Gender
</label>

<select
name="gender"
class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
>

<option value="Male" {% if patient.gender == "Male" %}selected{% endif %}>Male</option>

<option value="Female" {% if patient.gender == "Female" %}selected{% endif %}>Female</option>

<option value="Other" {% if patient.gender == "Other" %}selected{% endif %}>Other</option>

</select>

</div>



</div>



<!-- Address -->

<div>

<label class="block text-sm font-medium text-gray-600 mb-1">
Address
</label>

<input
type="text"
name="address"
value="{{ patient.address }}"
class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
>

</div>



<!-- ACTION BUTTONS -->

<div class="flex gap-4 pt-4">

<button
type="submit"
class="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-medium"
>

Update Patient

</button>


<a href="{% url 'patient_list' %}"
class="flex-1 text-center bg-gray-200 py-3 rounded-lg hover:bg-gray-300">

Cancel

</a>

</div>



</form>

</div>

</div>

</div>

{% endblock %}
