<!DOCTYPE html>
<html>
<head>

<title>FlowDesk</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* Global Reset */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* Body */

body{
font-family:'Inter',sans-serif;
background:#f5f7fb;
color:#1f2937;
overflow-x:hidden;
}

/* Container */

.container{
max-width:1200px;
margin:auto;
padding-left:16px;
padding-right:16px;
width:100%;
}

/* Navbar */

.navbar{
background:#111827;
padding:14px 0;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.navbar-brand{
font-weight:600;
font-size:18px;
letter-spacing:0.3px;
color:white;
}

/* Cards */

.card{
background:white;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.06);
padding:20px;
}

/* Tables */

.table{
width:100%;
background:white;
border-radius:10px;
overflow:hidden;
}

.table thead{
background:#f3f4f6;
}

.table th{
font-weight:600;
font-size:13px;
color:#6b7280;
padding:14px;
text-align:left;
}

.table td{
vertical-align:middle;
font-size:14px;
padding:14px;
border-top:1px solid #f1f1f1;
}

/* Buttons */

.btn{
border-radius:8px;
font-weight:500;
padding:6px 14px;
font-size:14px;
transition:0.2s;
}

.btn-primary{
background:#2563eb;
color:white;
}

.btn-primary:hover{
background:#1d4ed8;
}

.btn-success{
background:#16a34a;
color:white;
}

.btn-success:hover{
background:#15803d;
}

.btn-danger{
background:#dc2626;
color:white;
}

.btn-danger:hover{
background:#b91c1c;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar">

<div class="container flex items-center justify-between">

<a class="navbar-brand" href="/dashboard/">
FlowDesk
</a>

<!-- Desktop Menu -->

<ul class="hidden md:flex gap-6 text-sm items-center text-gray-300">

<li>
<a class="hover:text-white" href="/dashboard/">Dashboard</a>
</li>

<li>
<a class="hover:text-white" href="/">Patients</a>
</li>

<li>
<a class="hover:text-white" href="/appointments/">Appointments</a>
</li>

<li>
<a class="hover:text-white" href="/add-patient/">Add Patient</a>
</li>

<li class="relative">

<button onclick="toggleSettings()" class="text-xl text-white">
⚙
</button>

<div id="settingsMenu" class="hidden absolute right-0 mt-2 w-40 bg-white shadow-lg rounded-lg overflow-hidden">

<a class="block px-4 py-2 text-gray-700 hover:bg-gray-100" href="/profile/">
My Profile
</a>

<a class="block px-4 py-2 text-gray-700 hover:bg-gray-100" href="/change-password/">
Change Password
</a>

<a class="block px-4 py-2 hover:bg-red-50 text-red-500" href="/logout/">
Logout
</a>

</div>

</li>

</ul>

<!-- Mobile Hamburger -->

<button onclick="toggleMobileMenu()" class="md:hidden text-white text-2xl">
☰
</button>

</div>

<!-- Mobile Menu -->

<div id="mobileMenu" class="hidden bg-gray-900 text-gray-300 text-sm md:hidden">

<a class="block px-6 py-3 border-t border-gray-800" href="/dashboard/">Dashboard</a>

<a class="block px-6 py-3 border-t border-gray-800" href="/">Patients</a>

<a class="block px-6 py-3 border-t border-gray-800" href="/appointments/">Appointments</a>

<a class="block px-6 py-3 border-t border-gray-800" href="/add-patient/">Add Patient</a>

<a class="block px-6 py-3 border-t border-gray-800" href="/profile/">My Profile</a>

<a class="block px-6 py-3 border-t border-gray-800" href="/logout/">Logout</a>

</div>

</nav>

<!-- Page Content -->

<div class="container mt-6">

{% block content %}

{% endblock %}

</div>

<script>

function toggleMobileMenu(){
const menu = document.getElementById("mobileMenu");
menu.classList.toggle("hidden");
}

function toggleSettings(){
const menu = document.getElementById("settingsMenu");
menu.classList.toggle("hidden");
}

window.onclick = function(event) {

if (!event.target.closest('.relative')) {

const menu = document.getElementById("settingsMenu");

if(menu){
menu.classList.add("hidden");
}

}

}

</script>

</body>
</html>
