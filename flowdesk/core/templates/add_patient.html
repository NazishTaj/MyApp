{% extends "base.html" %}

{% block content %}

<div class="max-w-2xl mx-auto px-4 md:px-0">

<!-- Header -->

<div class="mb-6">

<h2 class="text-xl md:text-2xl font-semibold">Add Patient</h2>

<p class="text-gray-500 text-sm">
Enter patient details
</p>

</div>


<!-- Form Card -->

<div class="bg-white rounded-xl shadow p-4 md:p-6">

<form method="POST">

{% csrf_token %}


<!-- Name -->

<div class="mb-5">

<label class="block text-sm font-medium text-gray-700 mb-1">
Name
</label>

<input 
type="text" 
name="name"
placeholder="Enter patient name"
class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-200"
required>

</div>


<!-- Phone -->

<div class="mb-5">

<label class="block text-sm font-medium text-gray-700 mb-1">
Phone
</label>

<input 
type="text" 
name="phone"
value="{{ prefill_phone }}"
placeholder="Enter phone number"
class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-200"
required>

</div>


<!-- Address -->

<div class="mb-5">

<label class="block text-sm font-medium text-gray-700 mb-1">
Address
</label>

<textarea 
name="address"
rows="2"
placeholder="Enter address"
class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-200">
</textarea>

</div>


<!-- Age -->

<div class="mb-5">

<label class="block text-sm font-medium text-gray-700 mb-1">
Age
</label>

<input 
type="number"
name="age"
placeholder="Enter age"
class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-200">

</div>


<!-- Gender -->

<div class="mb-6">

<label class="block text-sm font-medium text-gray-700 mb-1">
Gender
</label>

<select 
name="gender"
class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-200">

<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>

</select>

</div>


<!-- Buttons -->

<div class="flex flex-col sm:flex-row gap-3">

<button 
type="submit"
class="w-full sm:w-auto px-4 py-2 text-sm bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition shadow-sm">

Save Patient

</button>

<a 
href="/"
class="w-full sm:w-auto px-4 py-2 text-sm bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition text-center">

Cancel

</a>

</div>


</form>

</div>

</div>

{% endblock %}
